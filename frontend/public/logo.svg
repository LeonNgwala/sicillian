<svg xmlns="http://www.w3.org/2000/svg" width="240" height="60" viewBox="0 0 240 60">
  <defs>
    <linearGradient id="g" gradientUnits="userSpaceOnUse" x1="8" y1="8" x2="52" y2="52">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Arc mark centered at (30,30) -->
  <!-- Arcs sweep CCW (sweep-flag=0) from right side through the left, creating outward fan -->
  <g transform="rotate(-45, 30, 30)">
    <!-- Outer arc r=22 -->
    <path d="M 33.8 8.3 A 22 22 0 0 0 33.8 51.7" fill="none" stroke="url(#g)" stroke-width="5.5" stroke-linecap="round" opacity="1"/>
    <!-- Mid arc r=14 -->
    <path d="M 32.4 16.2 A 14 14 0 0 0 32.4 43.8" fill="none" stroke="url(#g)" stroke-width="4.5" stroke-linecap="round" opacity="0.6"/>
    <!-- Inner arc r=7 -->
    <path d="M 31.2 23.1 A 7 7 0 0 0 31.2 36.9" fill="none" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Endpoint dots on outermost arc, absolute coords after -45deg rotation around (30,30) -->
  <circle cx="17.3" cy="12.0" r="3.5" fill="#34d399"/>
  <circle cx="48.0" cy="42.7" r="3.5" fill="#22d3ee"/>

  <!-- Wordmark -->
  <text x="68" y="30" dominant-baseline="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#0f172a">Skills</tspan><tspan fill="#34d399">Grid</tspan>
  </text>
</svg>
